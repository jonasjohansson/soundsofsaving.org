name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:          # manual "rebuild now" button
  schedule:
    - cron: '17 6 * * *'      # daily rebuild (06:17 UTC)

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate          # fail fast on malformed content
      - name: Cache generated responsive images
        uses: actions/cache@v4
        with:
          path: _site/assets/img/opt
          key: img-opt-${{ hashFiles('src/assets/img/**') }}
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
