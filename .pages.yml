# Pages CMS config — https://pagescms.org
# Install the Pages CMS GitHub App on this repo, then edit at app.pagescms.org.

# Each image folder the CMS should let you browse / upload to. `name` is how
# image fields below reference a folder (options.media).
media:
  - name: sessions
    label: Session thumbnails
    input: src/assets/img/sessions
    output: /assets/img/sessions
    categories: [image]
  - name: news
    label: News images
    input: src/assets/img/news
    output: /assets/img/news
    categories: [image]
  - name: site
    label: Site images (logo, hero, og)
    input: src/assets/img/site
    output: /assets/img/site
    categories: [image]

content:
  - name: sessions
    label: Sessions
    type: collection
    path: content/sessions
    filename: '{fields.artist} - {fields.song_title}.md'
    view:
      fields: [artist, song_title, date, featured]
      primary: artist
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - { name: artist, label: Artist, type: string, required: true, description: "Performer / interviewee — e.g. “Neil Young”" }
      - { name: song_title, label: Song title, type: string, description: "The song that found them — e.g. “Out on the Weekend”" }
      - { name: covers, label: "Covers (original artist)", type: string, description: "If they're covering someone else's song, the original artist — e.g. “Nick Drake”. Renders as “X covers Y”." }
      - { name: date, label: Date, type: date, options: { format: yyyy-MM-dd }, description: "Episode / publish date. Drives ordering of the series (newest first)." }
      - { name: youtube_url, label: YouTube URL, type: string, pattern: '^$|^https?://', description: "Full link to the episode video — e.g. https://youtu.be/08ts6hekHlc" }
      - { name: youtube_id, label: YouTube ID, type: string, description: "The 11-character video id (the part after youtu.be/ or v=). Used for the embed and the default thumbnail." }
      - { name: thumbnail, label: Thumbnail, type: image, options: { media: sessions }, description: "Defaults to the YouTube thumbnail for the id above; set this only to override it." }
      - { name: featured, label: Featured, type: boolean, description: "Featured episodes are pinned to the top of the Sessions hub and shown on the home page." }
      - { name: kind, label: Kind, type: select, options: { values: ['', short, favorite], multiple: false }, description: "Optional episode flavour: a short clip or a fan favourite." }
      - { name: pull_quote, label: Pull quote, type: text, description: "A short line from the artist, highlighted on the episode page." }
      - { name: story, label: Story, type: rich-text, description: "The story behind the song. Written in the file body (Markdown). Optional." }

  - name: news
    label: News
    type: collection
    path: content/news
    filename: '{fields.title}.md'
    view:
      fields: [title, date, category, author]
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date, required: true, options: { format: yyyy-MM-dd } }
      - { name: author, label: Author, type: string }
      - { name: category, label: Category, type: select, options: { values: [story, learn, resource-sheet, whitepaper, archive] }, description: "Where the post lives: stories (/stories/), learn / resource-sheet / whitepaper (/learn/), or archive (/archive/)." }
      - { name: cluster, label: Cluster, type: select, options: { values: [interviews, features, reviews] }, description: "For stories only: which Stories cluster this belongs to." }
      - { name: image, label: Hero image, type: image, options: { media: news }, description: "Shown at the top of the post and in link previews." }
      - { name: summary, label: Summary, type: text, description: "One- or two-line teaser shown on the index and used as the link-preview text." }
      - { name: body, label: Body, type: rich-text, description: "The post itself (Markdown)." }

  - name: page_programs
    label: "Page: Programs"
    type: file
    path: content/pages/programs.json
    fields:
      - { name: title, label: Title, type: string }
      - { name: meta_description, label: "SEO description", type: text }
      - { name: heading, label: Heading, type: string }
      - { name: lead, label: Lead paragraph, type: text }
      - name: how_it_works
        label: How it works
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - name: steps
            label: Steps
            type: object
            list:
              sortable: true
              collapsible:
                collapsed: true
                summary: '{label}'
            fields:
              - { name: label, label: Label, type: string }
              - { name: body, label: Body, type: text }
      - name: groups
        label: Program groups
        type: object
        list:
          sortable: true
          collapsible:
            collapsed: true
            summary: '{label}'
        fields:
          - { name: id, label: ID, type: string }
          - { name: label, label: Label, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: intro, label: Intro, type: text }
          - name: cards
            label: Cards
            type: object
            list:
              sortable: true
              collapsible:
                collapsed: true
                summary: '{title}'
            fields:
              - { name: featured, label: Featured, type: boolean }
              - { name: eyebrow, label: Eyebrow, type: string }
              - { name: title, label: Title, type: string }
              - { name: what, label: What it is, type: text }
              - { name: who, label: "Who it's for", type: text }
              - { name: happens, label: What happens, type: text }
              - { name: proof, label: Proof, type: text }
              - name: cta
                label: CTA
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href, label: Link, type: string }
      - name: educators_pointer
        label: Educators pointer
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Title, type: string }
          - { name: body, label: Body, type: text }
          - name: cta
            label: CTA
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }

  - name: page_educators
    label: "Page: Educators"
    type: file
    path: content/pages/educators.json
    fields:
      - { name: title, label: Title, type: string }
      - { name: meta_description, label: "SEO description", type: text }
      - { name: heading, label: Heading, type: string }
      - { name: lead, label: Lead paragraph, type: text }
      - { name: pullquote, label: Pull quote, type: text }
      - { name: pullquote_attribution, label: Pull quote attribution, type: string }
      - { name: why_music, label: Why music, type: text }
      - name: tracks
        label: Tracks
        type: object
        list:
          sortable: true
          collapsible:
            collapsed: true
            summary: '{title}'
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Title, type: string }
          - { name: summary, label: Summary, type: text }
          - { name: audience, label: Audience, type: text }
          - { name: spec_heading, label: Spec heading, type: string }
          - { name: spec, label: Spec items, type: string, list: true }
          - name: cta
            label: CTA
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
      - name: proof
        label: Proof band
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - name: stats
            label: Stats
            type: object
            list:
              sortable: true
              collapsible:
                collapsed: true
                summary: '{stat}'
            fields:
              - { name: stat, label: Stat, type: string }
              - { name: body, label: Body, type: text }
              - { name: source, label: Source, type: string }
          - { name: credibility, label: Credibility points, type: string, list: true }
      - name: lead_magnet
        label: Lead magnet
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Title, type: string }
          - { name: body, label: Body, type: text }
          - name: cta
            label: CTA
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
      - name: intake
        label: Intake form
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: text }

  - name: page_about
    label: "Page: About Us"
    type: file
    path: content/pages/about.json
    fields:
      - { name: title, label: Title, type: string }
      - { name: meta_description, label: "SEO description", type: text }
      - { name: intro, label: Intro, type: text }
      - name: why_now
        label: Why Now
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: text }
          - { name: stats, label: Stats, type: string, list: true }
          - { name: sources, label: Sources, type: string, list: true }
          - { name: pullquote, label: Pull quote, type: text }
          - { name: pullquote_attribution, label: Pull quote attribution, type: string }
      - name: research
        label: "A Sound Approach (research band)"
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: text }
          - name: cta
            label: CTA
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
              - { name: external, label: Opens in new tab, type: boolean }
      - name: founding_story
        label: Founding Story
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: text }
      - name: team
        label: Team
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - name: members
            label: Members
            type: object
            list:
              sortable: true
              collapsible:
                collapsed: true
                summary: '{name}'
            fields:
              - { name: name, label: Name, type: string }
              - { name: role, label: Role, type: string }
              - { name: email, label: Email, type: string, pattern: '^$|^[^@\s]+@[^@\s]+\.[^@\s]+$' }
              - { name: bio, label: Bio, type: text }
      - name: board_of_directors
        label: Board of Directors
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - name: members
            label: Members
            type: object
            list:
              sortable: true
              collapsible:
                collapsed: true
                summary: '{name}'
            fields:
              - { name: name, label: Name, type: string }
              - { name: bio, label: Bio, type: text }
      - name: advisory_board
        label: Advisory Board
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: intro, label: Intro, type: text }
          - name: members
            label: Members
            type: object
            list:
              sortable: true
              collapsible:
                collapsed: true
                summary: '{name}'
            fields:
              - { name: name, label: Name, type: string }
              - { name: bio, label: Bio, type: text }

  - name: page_community
    label: "Page: Community"
    type: file
    path: content/pages/community.json
    fields:
      - { name: title, label: Title, type: string }
      - { name: meta_description, label: "SEO description", type: text }
      - name: partners
        label: Partners
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: note, label: Note, type: text }
          - name: logos
            label: Logos
            type: object
            list:
              sortable: true
              collapsible:
                collapsed: true
                summary: '{alt}'
            fields:
              - { name: alt, label: Alt text, type: string }
              - { name: src, label: Image source, type: string }

  - name: page_get_help
    label: "Page: Get Help"
    type: file
    path: content/pages/get-help.json
    fields:
      - { name: title, label: Title, type: string }
      - { name: meta_description, label: "SEO description", type: text }
      - name: crisis
        label: Crisis card
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: intro, label: Intro, type: text }
          - { name: phone, label: Phone, type: string }
          - { name: phone_label, label: Phone label, type: string }
          - { name: text_keyword, label: Text keyword, type: string }
          - { name: text_number, label: Text number, type: string }
      - name: directory
        label: Directory
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: intro, label: Intro, type: text }

  - name: resources
    label: Resources directory
    type: file
    path: content/resources.json
    description: "The Get Help resource directory. NOTE: this file is normally regenerated by scripts/parse-resources.js — manual edits here may be overwritten on the next parse. Categories and locations are the filter facets."
    fields:
      - name: categories
        label: Categories (facets)
        type: object
        list:
          sortable: true
          collapsible:
            collapsed: true
            summary: '{label}'
        fields:
          - { name: slug, label: Slug, type: string }
          - { name: label, label: Label, type: string }
      - name: locations
        label: Locations (facets)
        type: object
        list:
          sortable: true
          collapsible:
            collapsed: true
            summary: '{label}'
        fields:
          - { name: slug, label: Slug, type: string }
          - { name: label, label: Label, type: string }
      - name: resources
        label: Resources
        type: object
        list:
          sortable: true
          collapsible:
            collapsed: true
            summary: '{name}'
        fields:
          - { name: name, label: Name, type: string }
          - { name: description, label: Description, type: text }
          - { name: url, label: URL, type: string }
          - { name: phone, label: Phone, type: string }
          - { name: categories, label: Categories, type: string, list: true }
          - { name: locations, label: Locations, type: string, list: true }

  - name: settings
    label: Site settings
    type: file
    path: content/settings.json
    fields:
      - { name: site_title, label: Site title, type: string }
      - { name: tagline, label: Tagline, type: text }
      - { name: meta_description, label: "SEO: default description", type: text, description: "Fallback search / link-preview text (~150 chars)." }
      - { name: hero_heading, label: Hero heading, type: string }
      - { name: hero_subheading, label: Hero subheading, type: text }
      - { name: donate_url, label: Donate URL, type: string, pattern: '^$|^https?://' }
      - { name: donate_label, label: Donate button label, type: string }
      - { name: get_help_url, label: Get Help URL, type: string }
      - { name: copyright, label: Copyright, type: string }
      - { name: privacy_url, label: Privacy URL, type: string }
      - name: nav
        label: Navigation
        type: object
        list:
          sortable: true
          collapsible:
            collapsed: true
            summary: '{label}'
        fields:
          - { name: label, label: Label, type: string }
          - { name: url, label: URL, type: string }
      - name: crisis_line
        label: Crisis line
        type: object
        fields:
          - { name: name, label: Name, type: string }
          - { name: intro, label: Intro, type: text }
          - { name: phone, label: Phone, type: string }
          - { name: url, label: URL, type: string }
          - { name: action, label: Action label, type: string }
      - name: socials
        label: Social links
        type: object
        fields:
          - { name: youtube, label: YouTube URL, type: string, pattern: '^$|^https?://' }
          - { name: facebook, label: Facebook URL, type: string, pattern: '^$|^https?://' }
          - { name: spotify, label: Spotify URL, type: string, pattern: '^$|^https?://' }
          - { name: twitter, label: Twitter URL, type: string, pattern: '^$|^https?://' }
          - { name: instagram, label: Instagram URL, type: string, pattern: '^$|^https?://' }
      - name: seo
        label: "SEO: per-page descriptions"
        type: object
        fields:
          - { name: home, label: Home, type: text }
          - { name: programs, label: Programs, type: text }
          - { name: about, label: About, type: text }
          - { name: resources, label: Resources, type: text }
